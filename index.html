<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignitus Packs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- MENÚ LATERAL IZQUIERDO DE REDES SOCIALES -->
    <div class="social-sidebar">
        <a href="YOUR_YOUTUBE_LINK" target="_blank" class="link-youtube">YouTube</a>
        <a href="YOUR_DISCORD_LINK" target="_blank" class="link-discord">Discord</a>
    </div>

    <header>
        <h1>Ignitus Texture Packs</h1>
    </header>

    <main class="packs-container">

        <!-- ==================== PACK 1: VANTIX ==================== -->
        <div class="pack-card" style="--borde-color: #8a2be2;">
            <div class="pack-content">
                <img src="vantex-thumbnail.png" alt="VANTIX Pack" class="pack-img">
                
                <!-- DESCRIPCIÓN Y CRÉDITOS ENCIMA DE LA IMAGEN -->
                <div class="pack-info-overlay">
                    <p class="pack-description">Un pack optimizado para aumentar tus FPS en PvP.</p>
                    <p class="pack-credits">Créditos: Algunas texturas pertenecen a @CreadorOriginal</p>
                </div>
            </div>
            
            <div class="pack-bar">
                <span class="pack-name">VANTIX</span>
                <a href="vantix-file.zip" class="download-btn" download>DOWNLOAD</a>
            </div>
        </div>
        <!-- ==================== END PACK 1 ==================== -->
        <!-- ==================== PACK 2: NEXT PACK ==================== -->
        <div class="pack-card" style="--borde-color: #00ffff;">
            <div class="pack-content">
                <img src="next-thumbnail.png" alt="Next Pack" class="pack-img">
                
                <!-- DESCRIPCIÓN Y CRÉDITOS DEL SIGUIENTE PACK -->
                <div class="pack-info-overlay">
                    <p class="pack-description">Próximamente un pack increíble con texturas personalizadas de espadas.</p>
                    <p class="pack-credits">Créditos: Inspirado en el estilo clásico de Bloxd.</p>
                </div>
            </div>
            
            <div class="pack-bar">
                <span class="pack-name">NEXT PACK</span>
                <button class="coming-soon-btn" disabled>COMING SOON</button>
            </div>
        </div>
        <!-- ==================== END PACK 2 ==================== -->

    </main>

</body>
</html>
