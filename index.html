<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignitus Packs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Ignitus Texture Packs</h1>
    </header>

    <main class="packs-container">

        <!-- ==================== PACK 1: VANTEX (CON BOTÓN DOWNLOAD) ==================== -->
        <!-- 🎨 MIRA AQUÍ: He añadido '--borde-color: #8a2be2;' para que este pack tenga un neón morado fijo. ¡Puedes cambiar ese código de color por el que quieras! -->
        <div class="pack-card" style="--borde-color: #8a2be2;">
            <img src="vantex-thumbnail.png" alt="Vantex Pack" class="pack-img">
            <div class="pack-bar">
                <span class="pack-name">Vantex</span>
                <!-- BOTÓN DISPONIBLE: Usa la clase "download-btn" para el botón blanco de descarga -->
                <a href="nombre-del-archivo.zip" class="download-btn" download>DOWNLOAD</a>
            </div>
        </div>
        <!-- ==================== FIN PACK 1 ==================== -->


        <!-- ==================== EJEMPLO PACK 2 (CON BOTÓN COMING SOON) ==================== -->
        <!-- Puedes borrar este bloque de ejemplo o usarlo para tu próximo pack. Este brilla en color cian (#00ffff) -->
        <div class="pack-card" style="--borde-color: #00ffff;">
            <img src="vantex-thumbnail.png" alt="Próximo Pack" class="pack-img">
            <div class="pack-bar">
                <span class="pack-name">Próximo Pack</span>
                <!-- BOTÓN PROXIMAMENTE: Usa la clase "coming-soon-btn" para el botón deshabilitado -->
                <button class="coming-soon-btn" disabled>COMING SOON</button>
            </div>
        </div>
        <!-- ==================== FIN PACK 2 ==================== -->

    </main>

    <footer>
        <div class="social-links">
            <a href="TU_LINK_DE_YOUTUBE" target="_blank">YouTube</a>
            <a href="TU_LINK_DE_DISCORD" target="_blank">Discord</a>
        </div>
    </footer>

</body>
</html>
