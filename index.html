<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignitus Packs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Título Principal de la Web -->
    <header>
        <h1>Ignitus Texture Packs</h1>
    </header>

    <!-- Contenedor donde van todos los packs -->
    <main class="packs-container">

        <!-- ==================== PACK 1 (VANTEX) ==================== -->
        <div class="pack-card">
            <!-- Imagen del Pack (La que hiciste en Pixlr) -->
            <img src="vantex-thumbnail.png" alt="Vantex Pack" class="pack-img">
            
            <!-- Barra inferior con el Nombre y el Botón Cuadrado -->
            <div class="pack-bar">
                <span class="pack-name">Vantex</span>
                <!-- Reemplaza "nombre-del-archivo.zip" por el nombre real de tu pack subido a GitHub -->
                <a href="nombre-del-archivo.zip" class="download-btn" download>DOWNLOAD</a>
            </div>
        </div>
        <!-- ==================== FIN PACK 1 ==================== -->


        <!-- 💡 CUANDO QUIERAS AÑADIR OTRO PACK: 
             Solo copia desde donde dice PACK 1 hasta FIN PACK 1, 
             pégalo justo aquí abajo y cámbiale los nombres. -->


    </main>

    <!-- Pie de página con tus Redes Sociales -->
    <footer>
        <div class="social-links">
            <a href="TU_LINK_DE_YOUTUBE" target="_blank">YouTube</a>
            <a href="TU_LINK_DE_DISCORD" target="_blank">Discord</a>
        </div>
    </footer>

</body>
</html>
